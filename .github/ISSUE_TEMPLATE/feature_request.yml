name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like BigEd CC to do?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: How would you use this feature?
