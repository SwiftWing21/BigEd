name: Bug Report
description: Report a bug in BigEd CC
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Start BigEd CC\n2. Click...\n3. See error"
  - type: input
    id: version
    attributes:
      label: BigEd CC version
      placeholder: "0.051.05b"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: ["Windows 11", "Windows 10", "Linux", "macOS"]
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      render: shell
