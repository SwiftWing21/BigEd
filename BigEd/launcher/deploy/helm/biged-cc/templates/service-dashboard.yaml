apiVersion: v1
kind: Service
metadata:
  name: {{ include "biged-cc.fullname" . }}-dashboard
  labels:
    {{- include "biged-cc.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "biged-cc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
