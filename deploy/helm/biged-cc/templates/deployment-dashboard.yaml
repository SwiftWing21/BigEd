apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biged-cc.fullname" . }}-dashboard
  labels:
    {{- include "biged-cc.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "biged-cc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "biged-cc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image }}
          imagePullPolicy: {{ .Values.dashboard.imagePullPolicy }}
          command: ["python", "dashboard.py", "--port", "{{ .Values.config.dashboardPort }}"]
          workingDir: /app/fleet
          ports:
            - name: http
              containerPort: {{ .Values.config.dashboardPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "biged-cc.secretName" . }}
                optional: true
          env:
            - name: FLEET_TOML
              value: /config/fleet.toml
            - name: BIGED_K8S
              value: "1"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: fleet-db
              mountPath: /app/fleet/fleet.db
              subPath: fleet.db
            - name: knowledge
              mountPath: /app/fleet/knowledge
              readOnly: true
            - name: logs
              mountPath: /app/fleet/logs
              readOnly: true
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "biged-cc.configmapName" . }}
        - name: fleet-db
          persistentVolumeClaim:
            claimName: {{ include "biged-cc.fullname" . }}-fleet-db
        - name: knowledge
          persistentVolumeClaim:
            claimName: {{ include "biged-cc.fullname" . }}-knowledge
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "biged-cc.fullname" . }}-logs
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
