apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "biged-cc.configmapName" . }}
  labels:
    {{- include "biged-cc.labels" . | nindent 4 }}
data:
  fleet.toml: |
    # Auto-generated by Helm — do not edit manually.
    # Chart: {{ .Chart.Name }} {{ .Chart.Version }} | App: {{ .Chart.AppVersion }}

    [fleet]
    eco_mode = {{ .Values.config.ecoMode }}
    idle_enabled = {{ .Values.config.idleEnabled }}
    idle_timeout_secs = {{ .Values.config.idleTimeoutSecs }}
    max_workers = {{ include "biged-cc.maxWorkers" . | trim }}
    worker_scale_interval_secs = 900
    offline_mode = {{ .Values.config.offlineMode }}
    air_gap_mode = {{ .Values.config.airGapMode }}
    api_keys_required = false
    disabled_agents = ["sales", "onboarding", "implementation", "legal", "account_manager"]
    hitl_evolution = false

    [models]
    local = "{{ .Values.config.localModel }}"
    complex = "{{ .Values.config.complexModel }}"
    complex_provider = "{{ .Values.config.complexProvider }}"
    conductor_model = "{{ .Values.config.conductorModel }}"
    ollama_host = "{{ include "biged-cc.ollamaUrl" . }}"
    keep_alive_mins = {{ .Values.config.keepAliveMins }}

    [models.tiers]
    default = "qwen3:8b"
    mid = "qwen3:8b"
    low = "qwen3:1.7b"
    critical = "qwen3:0.6b"

    [gpu]
    mode = "{{ .Values.config.gpuMode }}"
    multi_gpu = false
    gpu_count = {{ if .Values.ollama.gpu.enabled }}{{ .Values.ollama.gpu.count }}{{ else }}0{{ end }}
    memory_mode = "discrete"

    [thermal]
    gpu_max_sustained_c = {{ .Values.config.gpuMaxSustainedC }}
    gpu_max_burst_c = {{ .Values.config.gpuMaxBurstC }}
    cpu_max_sustained_c = {{ .Values.config.cpuMaxSustainedC }}
    cooldown_target_c = 75
    cooldown_window_secs = 120
    poll_interval_secs = 5
    grace_period_secs = 20
    cooldown_after_swap_secs = 60
    cpu_temp_enabled = false

    [thermal.vram]
    emergency = 0.92
    high = 0.85
    restore = 0.60

    [review]
    enabled = {{ .Values.config.reviewEnabled }}
    max_rounds = 2
    provider = "{{ .Values.config.reviewProvider }}"
    claude_model = "claude-sonnet-4-6"
    gemini_model = "gemini-2.0-flash"
    local_model = "qwen3:8b"
    local_ctx = 16384
    local_think = true

    [dashboard]
    enabled = true
    port = {{ .Values.config.dashboardPort }}
    auto_open = false
    bind_address = "{{ .Values.config.dashboardBind }}"
    cors_origins = []

    [workers]
    nice_level = {{ .Values.config.workerNiceLevel }}
    cpu_limit_percent = {{ .Values.config.workerCpuLimitPercent }}
    coder_count = {{ .Values.config.coderCount }}
    memory_limit_mb = {{ include "biged-cc.workerMemoryLimit" . | trim }}

    [training]
    exclusive_lock = true
    auto_pause_gpu_tasks = true
    lock_timeout_secs = 7200
    default_profile = "conservative"

    [security]
    dashboard_token = ""
    admin_token = ""
    operator_token = ""
    sandbox_enabled = {{ .Values.config.sandboxEnabled }}

    [ditl]
    enabled = {{ .Values.config.ditlEnabled }}
    compliance_level = "{{ .Values.config.complianceLevel }}"
    force_local_phi = true
    data_retention_days = 2555
    auto_purge = true

    [backup]
    enabled = {{ .Values.config.backupEnabled }}
    interval_secs = {{ .Values.config.backupIntervalSecs }}
    location = "/data/backups"
    depth = {{ .Values.config.backupDepth }}
    prune_enabled = true

    [backup.targets]
    fleet_db = true
    rag_db = true
    config = true
    knowledge = true

    [integrity]
    enabled = true
    auto_manifest = true

    [federation]
    enabled = {{ .Values.config.federationEnabled }}
    peers = {{ .Values.config.federationPeers | toJson }}
    overflow_threshold = 0.85
    peer_timeout_secs = 5

    [idle]
    enabled = {{ .Values.config.idleEnabled }}
    threshold_polls = 30
    cooldown_secs = 60
    skills = ["code_quality", "benchmark", "skill_evolve", "code_review", "summarize"]

    [filesystem]
    enforce = false
    deny_by_default = false
    log_all_access = false

    [mcp]
    enabled = false

    [modules]
    hub_url = "https://github.com/SwiftWing21/BigEd-ModuleHub"
    auto_update = false
    verify_checksums = true
