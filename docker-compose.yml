# BigEd CC — Self-Hosted SaaS Deployment
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d --scale fleet=1  # single fleet instance
#   docker compose logs -f fleet      # follow fleet logs
#   docker compose down               # stop all services
#
# For GPU-less deployments, use the 'cpu' profile:
#   docker compose --profile cpu up -d
#
# v0.160.00b — Platform & SaaS foundation

services:
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: playwright-mcp
    command: ["--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*"]
    ports:
      - "127.0.0.1:8931:8931"
    volumes:
      - ./education-context:/workspace/education-context:ro
    init: true
    restart: unless-stopped

  fleet:
    build: .
    container_name: biged-fleet
    ports:
      - "127.0.0.1:5555:5555"
      - "127.0.0.1:8080:8080"
    volumes:
      - ./fleet/fleet.toml:/app/fleet/fleet.toml:ro
      - ./fleet:/app/fleet
      - ./BigEd:/app/BigEd
      - fleet-data:/app/fleet/knowledge
      - fleet-logs:/app/fleet/logs
      - biged-data:/app/data
    environment:
      - BIGED_PRODUCTION=1
      - OLLAMA_HOST=http://ollama:11434
      - BIGED_WEB_MODE=1
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/fleet/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: biged-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: biged-dashboard
    ports:
      - "127.0.0.1:5556:5555"
    volumes:
      - ./fleet:/app/fleet:ro
      - fleet-data:/app/fleet/knowledge:ro
    environment:
      - BIGED_PRODUCTION=1
      - BIGED_WEB_MODE=1
    depends_on:
      fleet:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fleet-data:
  fleet-logs:
  ollama-models:
  biged-data:
