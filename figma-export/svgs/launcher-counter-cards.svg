<svg xmlns="http://www.w3.org/2000/svg" width="600" height="70" viewBox="0 0 600 70">
  <!-- Total -->
  <rect x="0" y="0" width="90" height="60" rx="6" fill="#242424"/>
  <text x="45" y="30" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#4fc3f7" text-anchor="middle">8</text>
  <text x="45" y="48" font-family="Segoe UI, sans-serif" font-size="10" fill="#888" text-anchor="middle">TOTAL</text>
  <!-- Idle -->
  <rect x="100" y="0" width="90" height="60" rx="6" fill="#242424"/>
  <text x="145" y="30" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#4caf50" text-anchor="middle">5</text>
  <text x="145" y="48" font-family="Segoe UI, sans-serif" font-size="10" fill="#888" text-anchor="middle">IDLE</text>
  <!-- Busy -->
  <rect x="200" y="0" width="90" height="60" rx="6" fill="#242424"/>
  <text x="245" y="30" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#ff9800" text-anchor="middle">2</text>
  <text x="245" y="48" font-family="Segoe UI, sans-serif" font-size="10" fill="#888" text-anchor="middle">BUSY</text>
  <!-- Pending -->
  <rect x="300" y="0" width="90" height="60" rx="6" fill="#242424"/>
  <text x="345" y="30" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#ffd54f" text-anchor="middle">1</text>
  <text x="345" y="48" font-family="Segoe UI, sans-serif" font-size="10" fill="#888" text-anchor="middle">PENDING</text>
  <!-- Models -->
  <rect x="400" y="0" width="90" height="60" rx="6" fill="#242424"/>
  <text x="445" y="30" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#00bcd4" text-anchor="middle">3</text>
  <text x="445" y="48" font-family="Segoe UI, sans-serif" font-size="10" fill="#888" text-anchor="middle">MODELS</text>
</svg>