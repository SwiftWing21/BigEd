[tasks.payload]
agent_name = "coder_2"
perspective = "code critic / reviewer"
skill_name = "validate_payload"
description = "Utility skill that validates a payload dict against a schema definition before dispatching to another skill. Returns clear error messages for missing or wrong-type fields. Prevents cryptic failures deep in skill execution."
inputs = "payload: dict, schema: dict of {field: {type, required, default}}"
outputs = "validated payload dict with defaults filled in, or error dict with field-level messages"

[[tasks]]
type = "skill_draft"
[tasks.payload]
agent_name = "coder_2"
perspective = "code critic / reviewer"
skill_name = "retry_wrapper"
description = "Wraps any fleet skill call with configurable retry logic. Handles transient errors (network timeouts, Ollama overload, API rate limits) with exponential backoff. Logs each attempt and reason for retry."
inputs = "skill_name, payload, max_retries (default 3), backoff_seconds (default 5)"
outputs = "final result dict from the wrapped skill, or error after max retries"

