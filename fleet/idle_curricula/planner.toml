# Planner idle curriculum — generates workload batches when no tasks are pending

# ── Self-improvement: gap analysis + curriculum tuning ───────────────────────

[[tasks]]
type = "skill_learn"
[tasks.payload]
lookback_days = 14
auto_queue = true
max_proposals = 3

[[tasks]]
type = "curriculum_update"
[tasks.payload]
dry_run = false

# ── Workload planning ───────────────────────────────────────────────────────

[[tasks]]
type = "plan_workload"
[tasks.payload]
focus = "leads"
max_tasks = 15

[[tasks]]
type = "plan_workload"
[tasks.payload]
focus = "research"
max_tasks = 10

[[tasks]]
type = "plan_workload"
[tasks.payload]
focus = "business"
max_tasks = 12

[[tasks]]
type = "plan_workload"
[tasks.payload]
focus = "all"
max_tasks = 20

[[tasks]]
type = "plan_workload"
[tasks.payload]
focus = "security"
max_tasks = 8

# ── Security review (periodic fleet-wide scan) ───────────────────────────────

[[tasks]]
type = "security_review"
[tasks.payload]
severity_min = "LOW"
auto_fix = false
