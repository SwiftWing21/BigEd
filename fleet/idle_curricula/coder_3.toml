# ── Skill drafts ───────────────────────────────────────────────────────────────

[[tasks]]
type = "skill_draft"
[tasks.payload]
agent_name = "coder_3"
perspective = "performance optimizer"
skill_name = "batch_web_crawl"
description = "Crawls multiple URLs concurrently using httpx AsyncClient with a configurable concurrency limit. Takes a list of URLs (e.g. from lead_research output), crawls them in parallel, extracts contact info from each, and saves all results to knowledge/leads/crawled/batch_<date>.jsonl."
inputs = "urls: list of strings, concurrency: int (default 5), save: bool"
outputs = "list of crawl results, saved to knowledge/leads/crawled/batch_<date>.jsonl"

[[tasks]]
type = "skill_draft"
[tasks.payload]
agent_name = "coder_3"
perspective = "performance optimizer"
skill_name = "cache_ollama"
description = "Thin caching wrapper for Ollama inference calls. Stores prompt->response pairs in knowledge/ollama_cache.db (SQLite). On cache hit, returns instantly without calling Ollama. Useful for repeated discuss/review tasks with identical prompts."
inputs = "prompt, model, force_refresh (default False)"
outputs = "response text, cache_hit bool, latency_ms"

[[tasks]]
type = "skill_draft"
[tasks.payload]
agent_name = "coder_3"
perspective = "performance optimizer"
skill_name = "db_vacuum"
description = "Maintenance skill that runs VACUUM and ANALYZE on fleet.db, checks WAL size, removes DONE tasks older than N days, and reports DB file size before/after. Should run on a scheduled basis to keep the DB fast."
inputs = "keep_days: int (default 30), vacuum: bool (default True)"
outputs = "before_size_mb, after_size_mb, rows_deleted, wal_checkpointed"

