# Fleet API Key Registry
# Each [[key]] defines a known credential: purpose, which skills use it,
# pricing tier, and whether it's required or optional.
# The key_manager skill scans this file to report status and suggest wiring.

[[key]]
name        = "ANTHROPIC_API_KEY"
label       = "Anthropic / Claude API"
purpose     = "Sonnet synthesis docs, Haiku fleet tasks, 100-discard reviews, val_bpb improvement reviews"
skills      = ["synthesize", "review_discards"]
tier        = "paid"
required    = true
env_var     = "ANTHROPIC_API_KEY"
signup_hint = "console.anthropic.com → API Keys"

