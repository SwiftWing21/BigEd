[fleet]
eco_mode = false
idle_enabled = true         # workers self-improve when no tasks pending
idle_timeout_secs = 10
training_check_interval_secs = 15   # reduced: catch training start faster
max_workers = 10              # cap active workers at boot (Dr. Ders scales dynamically)
worker_scale_interval_secs = 900  # Dr. Ders checks RAM every 15min, adjusts worker count
openclaw_enabled = false     # multi-channel gateway (Discord/WhatsApp/Telegram/etc) — enable via FMA GUI
discord_bot_enabled = true   # lightweight Discord-only bridge to biged-fleetchat
offline_mode = false         # true = no internet; external API skills gracefully degrade, local Ollama works
air_gap_mode = false         # true = max isolation (implies offline_mode); no sockets, no secrets, skill whitelist
api_keys_required = false    # false = fleet works local-only (no Claude/Gemini keys needed); true = require at least one provider
disabled_agents = ["sales", "onboarding", "implementation", "legal", "account_manager"]  # agents excluded from fleet boot
hitl_evolution = false           # true = evolution proposals go to WAITING_HUMAN for operator approval

# Agent naming — themes and multi-device identity
[naming]
theme = "default"                # default | education | space | forge | cul-de-sac | robots | custom
device_name = ""                 # this device's identity in federation (empty = hostname)
# Custom name list (overrides theme for specific roles):
# [naming.custom]
# supervisor = "My Supervisor"
# coder = "CodeBot"

# Enterprise: federation naming override
# When federation is enabled, the federation controller can push a naming schema
# to all devices. Enterprise naming takes priority over local theme.
# [naming.enterprise]
# schema = "federation"          # use federation-assigned names
# prefix = "HQ"                  # prefix all agent names: HQ-Coder-1, HQ-Researcher

# v0.060.00b: Doctor in the Loop — HIPAA compliance mode
[ditl]
enabled = false
compliance_level = "none"        # none | soc2 | hipaa
force_local_phi = true
data_retention_days = 2555       # ~7 years
auto_purge = true
require_baa = true
disable_at_own_risk = false
audit_all_phi_access = true
ai_disclaimer = true
state_disclosure = ""  # TX | CA | none — state-specific AI disclosure requirements

[ditl.baa]
anthropic = false
google = false
local = true

[ditl.deidentification]
auto_strip_before_api = true
method = "safe_harbor"

# v0.054.00b: BigEd Personal Assistant
[assistant]
personality = "helpful, technical, concise"
stt_enabled = false
stt_model = "base"                   # tiny | base | small | medium (VRAM tradeoff)
stt_local_only = true                # Never send audio to cloud APIs
wake_word = ""                       # Empty = disabled. Set to "hey biged" etc.
tts_enabled = false                  # Local text-to-speech responses

[models]
local = "qwen3:8b"
complex = "qwen3:8b"
complex_provider = "local"    # "claude" | "gemini" | "local"
conductor_model = "qwen3:4b"  # CPU-pinned user chat model (num_gpu=0, ~2-3GB RAM, 0 VRAM)
vision_model = "llava"        # local multimodal model for image analysis (llava, minicpm-v, qwen-vl)
minimax_model = "MiniMax-M1-80k"
ollama_host = "http://localhost:11434"
keep_alive_mins = 30             # model stay loaded (auto-refreshed while app runs)

# Model hopping batch thresholds — don't swap models unless enough demand queued
# Prevents thrashing between tiers for single low-value tasks
[models.batch_thresholds]
high_value = 1                   # 1 high-priority task triggers model swap
medium_value = 5                 # 5 medium tasks triggers swap
low_value = 15                   # 15 low tasks triggers swap

[review]
enabled = true                 # evaluator-optimizer pass on skill outputs (Gemini P0: adversarial review on by default)
max_rounds = 2                 # max review-reject cycles per task (prevents loops)
provider = "api"               # "api" = Anthropic API key | "subscription" = Gemini free tier | "local" = Ollama
claude_model = "claude-sonnet-4-6"
gemini_model = "gemini-2.0-flash"
local_model = "qwen3:8b"       # local reviewer; prefixed with /think for extended reasoning
local_ctx = 16384              # extended context window for deeper review passes
local_think = true             # prepend /think to prompt (enables CoT on supported models)

# v0.165.00b: Multi-GPU & Unified Memory Support
[gpu]
mode = "eco"                         # "eco" = CPU-only Ollama, "full" = GPU
multi_gpu = false                    # Enable multi-GPU model splitting
gpu_count = 1                        # Number of GPUs (auto-detected if 0)
memory_mode = "discrete"             # discrete | unified (Mac Studio/DGX Spark)
cluster_enabled = false              # Enable networked GPU cluster
cluster_peers = []                   # Peer URLs for GPU cluster: ["http://rig2:11434"]
vram_aggregation = false             # Aggregate VRAM across GPUs for model selection
model_parallelism = "none"           # none | tensor | pipeline (Ollama handles this)

[thermal]
# Softened thresholds — only react to actual danger, not normal load
gpu_max_sustained_c = 82      # sustained temp ceiling — only intervene at real heat
gpu_max_burst_c = 85          # hard ceiling — pause GPU tasks (RTX 3080 Ti throttles at 93)
cpu_max_sustained_c = 85      # CPU package temp ceiling
cooldown_target_c = 75        # resume GPU tasks when below this for cooldown_window
cooldown_window_secs = 120    # 2 minutes below target before resuming (prevent bouncing)
poll_interval_secs = 5        # hw_supervisor main loop interval
grace_period_secs = 20        # worker drain time before model swap (longer = safer)
cooldown_after_swap_secs = 60 # prevent rapid model bouncing (1 min)
ambient_estimation = true     # track cooldown rate to estimate ambient temp
cpu_temp_enabled = true       # enable CPU temp reading (may require admin/lm-sensors/LHM)
# Linux: sudo apt install lm-sensors && sudo sensors-detect
# Windows: Install LibreHardwareMonitor (run as service for auto-elevation)
# macOS: brew install osx-cpu-temp

[thermal.vram]
# Relaxed thresholds — only swap models when genuinely out of room
# RTX 3080 Ti has 12GB. qwen3:8b uses ~6.9GB = 57%. Normal headroom.
emergency = 0.92              # >92% → emergency eviction (only ~1GB free)
high = 0.85                   # >85% → consider scaling down (only ~1.8GB free)
restore = 0.60                # <60% → operator can scale up via model-profile

[models.tiers]
default = "qwen3:8b"
mid = "qwen3:8b"
low = "qwen3:1.7b"
critical = "qwen3:0.6b"

[training]
exclusive_lock = true         # only 1 training process at a time
auto_pause_gpu_tasks = true   # pause GPU-heavy skills during training
lock_timeout_secs = 7200      # auto-release stale locks after 2h
default_profile = "conservative"  # aggressive | conservative | exploratory

[training.profiles.conservative]
max_iterations = 3
temperature = 0.3

[training.profiles.aggressive]
max_iterations = 10
temperature = 0.7

[training.profiles.exploratory]
max_iterations = 5
temperature = 0.9

[dashboard]
enabled = true                 # localhost web dashboard for fleet metrics
port = 5555
auto_open = true               # open dashboard in browser when fleet boot completes
bind_address = "127.0.0.1"    # listen address — set "0.0.0.0" for remote access (requires TLS + auth)
cors_origins = []              # allowed CORS origins for remote access (e.g. ["https://my-admin.example.com"])
theme = "figma"                # dashboard theme: classic | modern | figma

[openclaw]
port = 18789
channel = "stable"           # stable | beta | dev
# Configure channels in openclaw onboard — Discord, WhatsApp, Telegram, etc.

[launcher]
profile = "research"    # deployment profile: minimal | research | consulting | full
close_behavior = "tray"       # "tray" = minimize to system tray on close | "quit" = show close dialog
start_minimized = false       # true = start hidden in system tray, fleet boots in background
tray_notifications = true     # show tray notifications for HITL requests

[launcher.tabs]
command_center = true   # always on — core fleet view
agents = true           # always on — agent status + sparklines
crm = false             # bolt-on: contact/lead management
onboarding = false      # bolt-on: customer onboarding checklists
customers = false       # bolt-on: deployment tracking
accounts = false        # bolt-on: service account monitoring
ingestion = true        # file/folder import to RAG
outputs = true          # knowledge browser
owner_core = false      # bolt-on: owner dashboard — enable via walkthrough
intelligence = true     # system transparency, model controls, prompt queue, evaluation
manual_mode = true      # operator-driven compliance audit with prompt queue

[launcher.profiles.minimal]
modules = ["ingestion", "outputs"]

[launcher.profiles.research]
modules = ["ingestion", "outputs"]

[launcher.profiles.consulting]
modules = ["crm", "onboarding", "customers", "accounts", "ingestion", "outputs"]

[launcher.profiles.full]
modules = ["crm", "onboarding", "customers", "accounts", "ingestion", "outputs"]

[workers]
nice_level = 15
cpu_limit_percent = 10  # per worker via cpulimit; 4 workers = 40% total CPU
coder_count = 3          # number of coder_N instances (coder_1 … coder_N)
# Resource limits per worker (0.07.00)
memory_limit_mb = 512    # max RSS per worker process (0 = unlimited)

# Role-based skill affinity — agents prefer tasks matching their affinity.
# Unassigned tasks with affinity skills are claimed preferentially by matching agents.
# Agents can still claim non-affinity tasks if nothing else is available.
# Set enabled = false to let ALL agents run ALL skills (no role preference).
[affinity]
enabled = true
researcher = ["web_search", "arxiv_fetch", "summarize", "web_crawl", "browser_crawl", "rag_query", "unifi_manage", "home_assistant", "mqtt_inspect", "research_loop", "lead_research"]
coder = ["code_write", "code_review", "code_discuss", "code_write_review", "code_index", "code_quality", "fma_review", "skill_draft", "skill_test", "skill_evolve", "skill_chain", "skill_learn", "skill_promote", "skill_train", "code_refactor", "refactor_verify", "deploy_skill", "claude_code", "git_manager", "github_interact", "github_sync", "branch_manager"]
archivist = ["flashcard", "rag_index", "rag_query", "ingest", "rag_compress", "knowledge_prune", "marathon_log", "review_discards"]
analyst = ["analyze_results", "benchmark", "synthesize", "evaluate", "billing_ocr", "token_optimizer", "packet_optimizer", "regression_detector", "stability_report", "swarm_intelligence", "claude_efficiency"]
# Permanently disabled agents removed from affinity (0.051.00b) — skills redistributed to active roles.
# sales, onboarding, implementation, legal, account_manager affinities removed.
# Their skills are covered by researcher (lead_research), coder (code_write, discuss),
# security (legal_draft → removed), and analyst (account_review → evaluate).
security = ["security_audit", "pen_test", "security_review", "security_apply", "secret_rotate", "db_encrypt", "db_migrate", "key_manager"]
planner = ["plan_workload", "curriculum_update", "evolution_coordinator", "model_manager", "model_recommend", "oom_prevent", "memory_optimizer", "swarm_consensus", "hardware_profiler"]

[integrations]
unifi_enabled = false            # UniFi controller API integration
ha_enabled = false               # Home Assistant REST API integration
mqtt_enabled = false             # MQTT broker inspection

[security]
# Dashboard API authentication (0.07.00)
dashboard_token = ""  # Set a token to require auth on all /api/* endpoints. Empty = no auth (local dev).
# RBAC tokens (0.24.00) — role-based access control for dashboard API
admin_token = ""      # Full access: read + write + delete + configure. Set to enable admin role.
operator_token = ""   # Read + write access. Falls back to dashboard_token if set.
sandbox_enabled = false          # true = sandbox code_write/skill_test/benchmark in Docker (requires Docker)
sandbox_skills = ["code_write", "skill_test", "benchmark"]  # skills that run in Docker when sandbox_enabled
dependency_scan_enabled = true   # run pip-audit/pip-check during security_audit
network_hardening_enabled = true # verify Ollama/dashboard bound to 127.0.0.1 during pen_test

# v0.300.00b: SSO / OIDC / SAML — Enterprise Identity Federation
[sso]
enabled = false
provider = "oidc"                # oidc | saml
oidc_issuer = ""                 # e.g. https://accounts.google.com, https://login.microsoftonline.com/{tenant}/v2.0
oidc_client_id = ""              # OAuth2 client ID from your IdP
oidc_client_secret = ""          # OAuth2 client secret (or set SSO_CLIENT_SECRET env var)
saml_metadata_url = ""           # SAML IdP metadata URL (only used when provider = "saml")
session_expiry_hours = 8         # SSO session duration before re-authentication required
role_claim = "roles"             # OIDC claim containing user roles (Azure AD: "roles", Okta: "groups")
default_role = "viewer"          # role assigned when no matching claim found (admin/operator/developer/viewer/auditor)

[walkthrough]
completed = true
skipped_steps = []
completed_at = "2026-03-18T22:44:31"

# CT-4: Token budgets per skill (USD).
# Skills not listed here have no budget limit.
# Budget period: "day", "week", or "month"
# Budget enforcement: "warn" (log only), "throttle" (5s delay), "block" (reject task)
[budgets]
period = "day"
enforcement = "warn"
lead_research = 5.00
code_review = 3.00
web_search = 2.00
code_write = 4.00
security_audit = 3.00
plan_workload = 2.00
summarize = 1.50
synthesize = 2.00

# v0.42: Auto-boot — fleet starts automatically on system login
[autoboot]
enabled = false  # set true after running: lead_client.py install-service

# v0.42: Idle skill evolution — workers self-improve when no tasks pending
[idle]
enabled = true   # workers self-improve when no tasks pending
threshold_polls = 30  # consecutive idle polls before idle mode (~30s at 1s/poll)
cooldown_secs = 60    # minimum seconds between idle evolution runs per agent
skills = ["code_quality", "benchmark", "skill_evolve", "code_review", "summarize"]
# Note: skill_test removed from idle rotation — was 96% of all tasks (28k+ flood)

# v0.170.01b: Conversation context window manager — per-agent multi-turn context
[context]
max_turns = 5                    # sliding window: keep last N turns per agent
max_tokens = 4096                # token budget for total context (local models)
summarize_on_overflow = true     # summarize evicted turns instead of dropping them
persist_to_db = true             # save/load context to fleet.db for crash recovery
stale_hours = 24                 # clear contexts older than this (0 = never)

# 0.14: Knowledge integrity verification
[integrity]
enabled = true
auto_manifest = true  # auto-create manifest if missing

[github]
owner = "SwiftWing21"
repo = "BigEd"

[modules]
hub_url = "https://github.com/SwiftWing21/BigEd-ModuleHub"
enterprise_hub_url = ""           # Private org repo (empty = use public hub)
auto_update = false               # Check for module updates on boot
verify_checksums = true           # SHA-256 verification on download

# v0.31.00: MCP Server Integration — connect external tool servers to fleet skills
[mcp]
enabled = true                   # master switch for MCP server routing
config_path = ".mcp.json"        # path to MCP server definitions (relative to project root)

# Bundled default servers (ship with BigEd CC, no API keys needed)
[mcp.defaults]
playwright = true                # browser automation — browser_crawl, web_search fallback
filesystem = false               # file operations — ingest, rag_index, code_index
sequential_thinking = false      # multi-step reasoning — plan_workload, lead_research
memory = false                   # persistent cross-session knowledge — rag_index

# Skill-to-MCP routing: which skills prefer which MCP servers
[mcp.routing]
browser_crawl = "playwright"
web_search = "playwright"        # fallback when direct API unavailable
ingest = "filesystem"
rag_index = "filesystem"
code_index = "filesystem"
plan_workload = "sequential_thinking"
lead_research = "sequential_thinking"

# v0.30.00: A2A Federation — peer fleet discovery and task overflow routing
# v0.100.00b: Cross-fleet task routing with capacity aggregation
[federation]
enabled = false              # enable peer discovery and task forwarding
peers = []                   # peer fleet URLs (e.g. ["https://192.168.1.50:5555", "https://fleet2.local:5555"])
overflow_threshold = 0.85    # forward tasks to peers when local queue > 85% capacity
peer_timeout_secs = 5        # timeout for peer health probes
discovery_enabled = true     # auto-discover peers on local network (UDP broadcast + optional mDNS)
discovery_port = 5556        # UDP port for discovery beacons
discovery_method = "broadcast"  # "broadcast" = UDP only, "mdns" = zeroconf only, "both" = UDP + mDNS

routing_enabled = true       # enable cross-fleet task routing (requires enabled = true)
local_priority_min = 9       # tasks with priority >= this always stay local (critical tasks)
routing_timeout = 10         # seconds to wait for peer response when routing tasks

# v0.100.00b: Mutual TLS for fleet-to-fleet communication
[federation.tls]
enabled = false                    # opt-in, don't break existing setups
cert_dir = "fleet/certs"
auto_generate = true               # auto-gen CA + peer cert on first enable
ca_cert = "ca.pem"
peer_cert = "peer.pem"
peer_key = "peer-key.pem"
verify_peers = true                # require valid peer certs

[federation.deploy]
auto_approve = false          # require manual approval on receive (HITL gate)
max_package_mb = 50           # reject packages larger than this
backup_before_deploy = true   # auto-backup before applying incoming deployment

# v0.100.00b: Cross-Fleet HITL — aggregate and route human-in-the-loop tasks across peers
[federation.hitl]
aggregate_remote = true           # show remote HITL tasks in local dashboard
forward_notifications = true      # notify peers about local HITL tasks
remote_response_timeout = 30      # seconds to wait for peer response

# v0.51.02b: Auto-save & Backup — periodic snapshots of fleet state
[backup]
enabled = true
interval_secs = 1200             # 20 minutes default (beta). Min: 180 (3 min), configurable via UI
location = "~/BigEd-backups"     # changeable via Settings or fleet.toml
depth = 10                       # max backups to keep (1-20, or 0 for infinite)
prune_enabled = true             # true = clean up beyond depth. false = keep all (disk warning shown)
warn_disk_usage_pct = 80         # warn when backup dir exceeds this % of free disk

[backup.targets]
fleet_db = true
rag_db = true
config = true
knowledge = true

[backup.safety]
verify_integrity = true

# v0.051.07b: FileSystem Access Guard — SOC 2 compliant file access control
[filesystem]
enforce = false              # true = validate all file access (forced true on enterprise)
deny_by_default = false      # true = reject access to paths not in zones
log_all_access = false       # true = SOC 2 audit trail for file operations

[filesystem.zones]
knowledge = {path = "fleet/knowledge", access = "read_write"}
code_drafts = {path = "fleet/knowledge/code_drafts", access = "read_write"}
skills = {path = "fleet/skills", access = "read"}
config = {path = "fleet/fleet.toml", access = "read"}
backups = {path = "~/BigEd-backups", access = "full"}
workspace = {path = "fleet/knowledge/code_writes/workspace", access = "full"}
screenshots = {path = "fleet/knowledge/screenshots", access = "read_write"}
ditl_records = {path = "fleet/knowledge/ditl", access = "read_write"}
ditl_audit = {path = "fleet/logs/phi_audit", access = "read"}

[filesystem.overrides]
deploy_skill = {zones = ["skills"], access = "full"}
code_write = {zones = ["workspace", "code_drafts"], access = "full"}
ingest = {zones = ["knowledge"], access = "read_write"}

# v0.052.00b: Manual Mode — operator-driven Claude compliance audit settings
[manual_mode]
approval_required_threshold = 0.20  # HITL gate: require approval when token estimate increases >20% vs last run

# v0.135.00b: Enterprise & Multi-Tenant — tenant isolation, granular RBAC, SLA monitoring
[enterprise]
multi_tenant = false
tenant_id = ""                    # This instance's tenant ID (empty = single-tenant)
tenant_isolation = "database"     # database | schema | none

# v0.300.00b: Per-tenant encryption — Fernet-based field + file encryption
[enterprise.encryption]
enabled = false                       # toggle tenant encryption system
key_rotation_days = 90                # recommend key rotation after N days
encrypt_at_rest = true                # encrypt tenant DB fields at rest
encrypt_task_payloads = false         # encrypt task payload_json (performance impact)

# v0.300.00b: Per-tenant billing & metering
[billing]
enabled = false                      # enable billing/metering subsystem
currency = "USD"

[billing.pricing]
tokens_per_dollar = 1000000          # 1M tokens per dollar (base rate)
base_monthly = 0                     # flat monthly fee per tenant
overage_rate = 0.001                 # per-1K-token overage charge above quota

# v0.300.00b: Tenant Admin Dashboard — self-service tenant management
[enterprise.tenants]
enabled = false                          # master switch for tenant admin API
max_tenants = 100                        # hard cap on active tenants
tenant_data_dir = "fleet/tenants"        # root dir for tenant data (skills, DB, config)
default_max_agents = 5                   # default agent limit per tenant
default_max_skills = 50                  # default skill limit per tenant

# Event triggers — file watch, scheduled tasks, webhook dispatch
[triggers]
file_watch_enabled = true
file_watch_dir = "~/Downloads"
file_watch_extensions = [".pdf", ".md", ".txt", ".docx"]
webhook_enabled = true

# Scheduled tasks — periodic auto-dispatch (checked by supervisor loop)
# Format: name = {skill = "...", interval_hours = N, payload = "..."}
[schedules]
daily_code_review = {skill = "code_review", interval_hours = 24, payload = '{"scope": "changed_files"}'}
hourly_health = {skill = "stability_report", interval_hours = 1}

# v0.050.03b: Configurable boot timeouts — used by adaptive timeout in boot.py
[boot]
model_load_timeout = 300         # first-boot default timeout (seconds) for model loading

# Claude Maximum Efficiency — capacity bonus window tracking
[capacity]
enabled = true
provider = "claude"

# Promotion windows (updated manually or via claude_efficiency skill)
[[capacity.windows]]
start = "2026-03-13"
end = "2026-03-27"
weekday_bonus_start_et = 14      # 2PM ET — bonus starts after this
weekday_bonus_end_et = 8         # 8AM ET — bonus ends before this
weekend_all_day = true
multiplier = 2.0

[capacity.auto_scale]
deploy_agents = 2                # auto-deploy N extra agents during bonus
prefer_claude = true             # route to Claude instead of local during bonus
disable_budget_throttle = true   # bonus usage doesn't count against limits

# ── Self-Healing Fleet + Performance Auto-Rollback (v0.200.00b) ───
[self_healing]
enabled = true
health_sweep_interval = 60           # run health sweep every 60s in supervisor loop
max_task_retries = 3                 # auto-retry failed tasks up to N times
agent_stuck_timeout = 300            # 5 min no heartbeat = stuck agent
circuit_breaker_threshold = 3        # failures to trip circuit breaker
circuit_breaker_window = 300         # 5 min sliding window for failure counting
auto_rollback_enabled = true         # restore skill from code_drafts on regression
regression_threshold = 0.20          # 20% success rate drop = regression

# ── v0.200: ML Task Routing — sklearn-based agent selection ─────────
[routing]
ml_enabled = true                        # use trained ML model for agent-to-skill routing
retrain_interval_hours = 24              # auto-retrain model after this many hours
min_training_samples = 50                # minimum completed tasks before first training
fallback_to_iq = true                    # fall back to IQ-average heuristic if no model

# v0.200.00b: A/B Testing — experiment on skill variants with statistical evaluation
[experiments]
ab_testing_enabled = true
min_samples_per_variant = 20       # minimum trials per variant before evaluation
auto_promote_threshold = 0.95      # promote if variant p-value < 0.05 AND success rate > this

# ── Autonomous DAG Builder (v0.200.00b) ─────────────────────────────
[dag]
enabled = true
max_dag_depth = 10                       # max dependency chain depth
max_dag_tasks = 50                       # max tasks per DAG

# ── Predictive Scaling ML (v0.200.00b) ──────────────────────────────
[scaling]
ml_predictor_enabled = true              # use ML model when trained, else heuristic
predictor_retrain_hours = 12             # retrain model on this interval
min_scaling_history = 100                # minimum samples before training

# ── Dispatch Bridge (Cowork Dispatch → Fleet) ──────────────────────
[dispatch_bridge]
enabled = true
registered_claude_desktop = false
hitl_auto_approve_timeout_min = 0       # 0 = off (wait forever)
hitl_auto_approve_max_cost = 0          # 0 = no cost gate
dashboard_base_url = "http://127.0.0.1:5555"

# ── SaaS Control Plane (v0.400.00b) ──────────────────────────────────
[platform]
enabled = false                              # master switch for control plane API
control_plane_mode = false                   # true = this instance is a control plane (manages other fleets)
max_managed_fleets = 100                     # hard cap on tenant fleets managed by this control plane
default_agent_count = 4                      # default agent count when provisioning a new fleet

# ── Compliance Reporting (v0.300.00b) ─────────────────────────────────
[compliance]
enabled = false                              # master switch for compliance module
auto_generate = true                         # auto-generate reports on schedule
schedule = "monthly"                         # daily | weekly | monthly
report_types = ["soc2", "audit_summary", "sla"]  # report types to auto-generate
retention_days = 365                         # keep reports for 1 year
