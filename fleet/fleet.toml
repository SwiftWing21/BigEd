[fleet]
eco_mode = false
idle_enabled = false        # set true to allow workers to run idle curriculum
idle_timeout_secs = 30
training_check_interval_secs = 15   # reduced: catch training start faster
max_workers = 4
openclaw_enabled = false     # multi-channel gateway (Discord/WhatsApp/Telegram/etc) — enable via FMA GUI
discord_bot_enabled = true   # lightweight Discord-only bridge to biged-fleetchat

[models]
local = "qwen3:8b"
complex = "qwen3:8b"
complex_provider = "local"    # "claude" | "gemini" | "local"
conductor_model = "qwen3:4b"  # CPU-pinned user chat model (num_gpu=0, ~2-3GB RAM, 0 VRAM)
ollama_host = "http://localhost:11434"

[review]
enabled = false                # evaluator-optimizer pass on skill outputs
provider = "api"               # "api" = Anthropic API key | "subscription" = Gemini free tier | "local" = Ollama
claude_model = "claude-sonnet-4-6"
gemini_model = "gemini-2.0-flash"
local_model = "qwen3:8b"       # local reviewer; prefixed with /think for extended reasoning
local_ctx = 16384              # extended context window for deeper review passes
local_think = true             # prepend /think to prompt (enables CoT on supported models)

[gpu]
mode = "eco"  # "eco" = CPU-only Ollama, "full" = GPU

[dashboard]
enabled = true                 # localhost web dashboard for fleet metrics
port = 5555

[openclaw]
port = 18789
channel = "stable"           # stable | beta | dev
# Configure channels in openclaw onboard — Discord, WhatsApp, Telegram, etc.

[workers]
nice_level = 15
cpu_limit_percent = 10  # per worker via cpulimit; 4 workers = 40% total CPU
coder_count = 3          # number of coder_N instances (coder_1 … coder_N)

# Role-based skill affinity — agents prefer tasks matching their affinity.
# Unassigned tasks with affinity skills are claimed preferentially by matching agents.
# Agents can still claim non-affinity tasks if nothing else is available.
[affinity]
researcher = ["web_search", "arxiv_fetch", "summarize", "web_crawl", "rag_query"]
coder = ["code_write", "code_review", "code_discuss", "code_write_review", "code_index", "code_quality", "fma_review", "skill_draft", "skill_test", "skill_evolve"]
archivist = ["flashcard", "rag_index", "rag_query", "ingest"]
analyst = ["analyze_results", "benchmark", "synthesize"]
sales = ["lead_research", "marketing", "generate_asset"]
onboarding = ["discuss"]
implementation = ["code_write", "discuss"]
security = ["security_audit", "pen_test", "security_review", "security_apply"]
planner = ["plan_workload", "curriculum_update"]
legal = ["legal_draft"]
account_manager = ["account_review"]
