[fleet]
eco_mode = false
idle_enabled = false        # set true to allow workers to run idle curriculum
idle_timeout_secs = 30
training_check_interval_secs = 15   # reduced: catch training start faster
max_workers = 4
openclaw_enabled = false     # multi-channel gateway (Discord/WhatsApp/Telegram/etc) — enable via FMA GUI
discord_bot_enabled = true   # lightweight Discord-only bridge to biged-fleetchat
offline_mode = false         # true = no internet; external API skills gracefully degrade, local Ollama works
air_gap_mode = false         # true = max isolation (implies offline_mode); no sockets, no secrets, skill whitelist

[models]
local = "qwen3:8b"
complex = "qwen3:8b"
complex_provider = "local"    # "claude" | "gemini" | "local"
conductor_model = "qwen3:4b"  # CPU-pinned user chat model (num_gpu=0, ~2-3GB RAM, 0 VRAM)
ollama_host = "http://localhost:11434"

[review]
enabled = false                # evaluator-optimizer pass on skill outputs
max_rounds = 2                 # max review-reject cycles per task (prevents loops)
provider = "api"               # "api" = Anthropic API key | "subscription" = Gemini free tier | "local" = Ollama
claude_model = "claude-sonnet-4-6"
gemini_model = "gemini-2.0-flash"
local_model = "qwen3:8b"       # local reviewer; prefixed with /think for extended reasoning
local_ctx = 16384              # extended context window for deeper review passes
local_think = true             # prepend /think to prompt (enables CoT on supported models)

[gpu]
mode = "eco"  # "eco" = CPU-only Ollama, "full" = GPU

[thermal]
gpu_max_sustained_c = 75      # sustained temp ceiling — reduce workers above this
gpu_max_burst_c = 78          # hard ceiling — pause GPU tasks above this
cpu_max_sustained_c = 80      # CPU package temp ceiling
cooldown_target_c = 72        # resume GPU tasks when below this for cooldown_window
cooldown_window_secs = 60     # consecutive seconds below target to resume
poll_interval_secs = 5        # hw_supervisor main loop interval
grace_period_secs = 15        # worker drain time before model swap
cooldown_after_swap_secs = 30 # prevent rapid model bouncing
ambient_estimation = true     # track cooldown rate to estimate ambient temp

[thermal.vram]
# Thresholds for dynamic model tier selection (fraction 0.0-1.0)
emergency = 0.90              # >90% → emergency eviction
high = 0.75                   # >75% → scale to mid tier
restore = 0.60                # <60% → restore default model

[models.tiers]
default = "qwen3:8b"
mid = "qwen3:4b"
low = "qwen3:1.7b"
critical = "qwen3:0.6b"

[training]
exclusive_lock = true         # only 1 training process at a time
auto_pause_gpu_tasks = true   # pause GPU-heavy skills during training
lock_timeout_secs = 7200      # auto-release stale locks after 2h
default_profile = "conservative"  # aggressive | conservative | exploratory

[training.profiles.conservative]
max_iterations = 3
temperature = 0.3

[training.profiles.aggressive]
max_iterations = 10
temperature = 0.7

[training.profiles.exploratory]
max_iterations = 5
temperature = 0.9

[dashboard]
enabled = true                 # localhost web dashboard for fleet metrics
port = 5555

[openclaw]
port = 18789
channel = "stable"           # stable | beta | dev
# Configure channels in openclaw onboard — Discord, WhatsApp, Telegram, etc.

[launcher]
profile = "research"    # deployment profile: minimal | research | consulting | full

[launcher.tabs]
command_center = true   # always on — core fleet view
agents = true           # always on — agent status + sparklines
crm = false             # bolt-on: contact/lead management
onboarding = false      # bolt-on: customer onboarding checklists
customers = false       # bolt-on: deployment tracking
accounts = false        # bolt-on: service account monitoring
ingestion = true        # file/folder import to RAG
outputs = true          # knowledge browser

[launcher.profiles.minimal]
modules = ["ingestion", "outputs"]

[launcher.profiles.research]
modules = ["ingestion", "outputs"]

[launcher.profiles.consulting]
modules = ["crm", "onboarding", "customers", "accounts", "ingestion", "outputs"]

[launcher.profiles.full]
modules = ["crm", "onboarding", "customers", "accounts", "ingestion", "outputs"]

[workers]
nice_level = 15
cpu_limit_percent = 10  # per worker via cpulimit; 4 workers = 40% total CPU
coder_count = 3          # number of coder_N instances (coder_1 … coder_N)

# Role-based skill affinity — agents prefer tasks matching their affinity.
# Unassigned tasks with affinity skills are claimed preferentially by matching agents.
# Agents can still claim non-affinity tasks if nothing else is available.
[affinity]
researcher = ["web_search", "arxiv_fetch", "summarize", "web_crawl", "rag_query"]
coder = ["code_write", "code_review", "code_discuss", "code_write_review", "code_index", "code_quality", "fma_review", "skill_draft", "skill_test", "skill_evolve"]
archivist = ["flashcard", "rag_index", "rag_query", "ingest"]
analyst = ["analyze_results", "benchmark", "synthesize"]
sales = ["lead_research", "marketing", "generate_asset"]
onboarding = ["discuss"]
implementation = ["code_write", "discuss"]
security = ["security_audit", "pen_test", "security_review", "security_apply"]
planner = ["plan_workload", "curriculum_update"]
legal = ["legal_draft"]
account_manager = ["account_review"]

[walkthrough]
completed = false              # set true after finish or Skip All
skipped_steps = []             # list of step numbers skipped
completed_at = ""              # ISO date when completed/skipped
